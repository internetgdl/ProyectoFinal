name: Deploy Backend
on:
  push:
    branches: [main]
    paths:
      - 'App/Back/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
        working-directory: App/Back
      - name: Build (Typegen)
        run: npm run cf-typegen
        working-directory: App/Back
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: App/Back

  uat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: App/Back
      - name: Run UAT Tests
        id: test
        run: |
          cd App/Back
          npm run test:coverage > test-output.txt
          cat test-output.txt
        continue-on-error: false
      - name: Publish Test Summary
        run: |
          echo "### 🧪 UAT Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat App/Back/test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: App/Back/coverage

  release-dev:
    needs: uat
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: App/Back
      - name: Deploy to DEV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: App/Back

  release-prod:
    needs: release-dev
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - name: Dummy PROD Release
        run: |
          echo "🚀 Preparing Production Release..."
          echo "Status: PENDING APPROVAL"
          echo "This is a dummy job for demonstration."
